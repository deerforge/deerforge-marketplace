<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#0D1117"/>
  
  <!-- Antler Network - Icon only, centered -->
  <g stroke="#D97757" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central vertical stroke -->
    <line x1="100" y1="150" x2="100" y2="100"/>
    
    <!-- Primary bifurcation -->
    <line x1="100" y1="100" x2="80" y2="80"/>
    <line x1="100" y1="100" x2="120" y2="80"/>
    
    <!-- Secondary bifurcation - symmetric -->
    <line x1="80" y1="80" x2="65" y2="60"/>
    <line x1="80" y1="80" x2="95" y2="60"/>
    <line x1="120" y1="80" x2="105" y2="60"/>
    <line x1="120" y1="80" x2="135" y2="60"/>
  </g>
  
  <!-- Terminal nodes -->
  <g fill="#D97757">
    <circle cx="100" cy="150" r="4"/>
    <circle cx="65" cy="60" r="4"/>
    <circle cx="95" cy="60" r="4"/>
    <circle cx="105" cy="60" r="4"/>
    <circle cx="135" cy="60" r="4"/>
  </g>
</svg>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0D1117"/>
  
  <!-- Antler Network - Symmetric bilateral -->
  <g stroke="#D97757" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central vertical stroke -->
    <line x1="200" y1="280" x2="200" y2="200"/>
    
    <!-- Primary bifurcation -->
    <line x1="200" y1="200" x2="160" y2="160"/>
    <line x1="200" y1="200" x2="240" y2="160"/>
    
    <!-- Secondary bifurcation - perfectly symmetric -->
    <line x1="160" y1="160" x2="130" y2="120"/>
    <line x1="160" y1="160" x2="190" y2="120"/>
    <line x1="240" y1="160" x2="210" y2="120"/>
    <line x1="240" y1="160" x2="270" y2="120"/>
  </g>
  
  <!-- Terminal nodes -->
  <g fill="#D97757">
    <circle cx="200" cy="280" r="6"/>
    <circle cx="130" cy="120" r="6"/>
    <circle cx="190" cy="120" r="6"/>
    <circle cx="210" cy="120" r="6"/>
    <circle cx="270" cy="120" r="6"/>
  </g>
  
  <!-- DeerForge text -->
  <text x="200" y="330" font-family="Inter, sans-serif" font-weight="700" font-size="32" fill="#D97757" text-anchor="middle">DeerForge</text>
</svg>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0D1117"/>
  
  <!-- Antler Network - Ultra-minimal -->
  <g stroke="#D97757" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Single central stroke -->
    <line x1="200" y1="270" x2="200" y2="200"/>
    
    <!-- Minimal bifurcation -->
    <line x1="200" y1="200" x2="170" y2="150"/>
    <line x1="200" y1="200" x2="230" y2="150"/>
    
    <!-- Single additional split on each side -->
    <line x1="170" y1="150" x2="150" y2="120"/>
    <line x1="230" y1="150" x2="250" y2="120"/>
  </g>
  
  <!-- Terminal nodes -->
  <g fill="#D97757">
    <circle cx="200" cy="270" r="7"/>
    <circle cx="150" cy="120" r="7"/>
    <circle cx="250" cy="120" r="7"/>
    <circle cx="200" cy="200" r="5"/>
  </g>
  
  <!-- DeerForge text -->
  <text x="200" y="320" font-family="Inter, sans-serif" font-weight="700" font-size="34" fill="#D97757" text-anchor="middle">DeerForge</text>
</svg>
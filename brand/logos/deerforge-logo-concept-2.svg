<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0D1117"/>
  
  <!-- Antler Network - Tree-like asymmetric -->
  <g stroke="#D97757" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central vertical stroke -->
    <line x1="200" y1="290" x2="200" y2="210"/>
    
    <!-- Main bifurcation -->
    <line x1="200" y1="210" x2="170" y2="170"/>
    <line x1="200" y1="210" x2="250" y2="160"/>
    
    <!-- Left branch splits -->
    <line x1="170" y1="170" x2="150" y2="130"/>
    <line x1="170" y1="170" x2="185" y2="135"/>
    
    <!-- Right branch splits (asymmetric) -->
    <line x1="250" y1="160" x2="230" y2="120"/>
    <line x1="250" y1="160" x2="270" y2="130"/>
    <line x1="250" y1="160" x2="280" y2="115"/>
  </g>
  
  <!-- Terminal nodes -->
  <g fill="#D97757">
    <circle cx="200" cy="290" r="6"/>
    <circle cx="150" cy="130" r="6"/>
    <circle cx="185" cy="135" r="6"/>
    <circle cx="230" cy="120" r="6"/>
    <circle cx="270" cy="130" r="6"/>
    <circle cx="280" cy="115" r="6"/>
  </g>
  
  <!-- DeerForge text -->
  <text x="200" y="340" font-family="Inter, sans-serif" font-weight="700" font-size="32" fill="#D97757" text-anchor="middle">DeerForge</text>
</svg>
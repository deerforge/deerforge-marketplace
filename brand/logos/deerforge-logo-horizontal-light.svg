<svg width="200" height="36" viewBox="0 0 200 36" xmlns="http://www.w3.org/2000/svg">
  <!-- Antler/Network Mark -->
  <g transform="translate(0, 6)">
    <!-- Central stem -->
    <line x1="12" y1="24" x2="12" y2="12" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Left antler branch -->
    <line x1="12" y1="12" x2="6" y2="6" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="18" y2="6" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Network nodes -->
    <circle cx="6" cy="6" r="2.5" fill="#D97757"/>
    <circle cx="18" cy="6" r="2.5" fill="#D97757"/>
    <circle cx="12" cy="12" r="2.5" fill="#D97757"/>
    <circle cx="12" cy="24" r="2.5" fill="#D97757"/>
    
    <!-- Additional network connections -->
    <line x1="6" y1="6" x2="3" y2="3" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="6" x2="21" y2="3" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="3" cy="3" r="1.5" fill="#D97757"/>
    <circle cx="21" cy="3" r="1.5" fill="#D97757"/>
  </g>
  
  <!-- DEERFORGE Wordmark -->
  <g transform="translate(36, 0)">
    <text x="0" y="23" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#FAF9F5" letter-spacing="-0.02em">
      DEERFORGE
    </text>
  </g>
</svg>